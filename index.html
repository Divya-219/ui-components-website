<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divya Patel - Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">MyPortfolio</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#projects">Projects</a></li>
       <li><a href="#contact">Contact Us</a></li>
        <li><a href="#about">About Us</a></li>
      </ul>
    </nav>
  </header>
  <section class="hero">
    <h1>Welcome to My Portfolio</h1>
    <p>Creating modern, responsive, and beautiful websites.</p>
    <a href="#projects" class="cta-btn">View Projects</a>
  </section>

  <section class="projects-section" id="projects">
    <h2>My Projects</h2>
    <input type="text" id="searchInput" placeholder="Search Projects..." class="search-bar">

    <div class="projects-grid" id="projectsGrid">
</div>
  </section>

<section class="contact-section framed" id="contact">
    <h2>Contact Me</h2>
    <form class="contact-form">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
        <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
     <label for="subject">Subject</label>
     
      <select id="subject" name="subject" required>
        <option value="">Select a subject</option>
        <option value="design">Web Design</option>
        <option value="development">Development</option>
        <option value="app">App Design</option>
       <option value="other">Other</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 MyPortfolio. All rights reserved.</p>
    <p>Follow me on 
      <a href="#">LinkedIn</a> | 
      <a href="#">GitHub</a>  
     
    </p>
  </footer>
<script src="script.js"></script>
</body>
</html>
